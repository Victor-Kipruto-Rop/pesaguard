version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pesaguard
      POSTGRES_PASSWORD: pesaguard
      POSTGRES_DB: pesaguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  backend:
    build: .
    command: python app.py
    environment:
      DATABASE_URL: postgresql://pesaguard:pesaguard@postgres:5432/pesaguard
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - kafka

  dashboard:
    build: .
    command: python app_2.py
    environment:
      DATABASE_URL: postgresql://pesaguard:pesaguard@postgres:5432/pesaguard
    ports:
      - "5001:5001"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://dashboard:5001
    depends_on:
      - dashboard

volumes:
  pgdata:
