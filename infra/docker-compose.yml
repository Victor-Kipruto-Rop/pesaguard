version: '3.9'

# Data residency (Addendum III): keep DEPLOYMENT_REGION, BACKUP_REGION, and LOG_REGION
# consistent with DATA_RESIDENCY.md. Pilot default is ke-1 (Kenya / East Africa).
# This default should map to an in-region or East Africa–adjacent cloud deployment
# (for example AWS af-south-1) until in-country hosting is confirmed.
# Backups inherit BACKUP_REGION — do not store off-shore without documented legal basis.

x-residency-env: &residency-env
  DEPLOYMENT_REGION: ${DEPLOYMENT_REGION:-ke-1}
  BACKUP_REGION: ${BACKUP_REGION:-ke-1}
  LOG_REGION: ${LOG_REGION:-ke-1}

services:
  postgres:
    image: postgres:16
    environment:
      <<: *residency-env
      POSTGRES_DB: pesaguard
      POSTGRES_USER: pesaguard
      POSTGRES_PASSWORD: pesaguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.7
    environment:
      <<: *residency-env
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: yes
    ports:
      - "9092:9092"

  redis:
    image: redis:7
    environment:
      <<: *residency-env
    ports:
      - "6379:6379"

  rq-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      <<: *residency-env
      DATABASE_URL: ${DATABASE_URL:-postgresql://pesaguard:pesaguard@postgres:5432/pesaguard}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-transaction_events}
      TENANT_ID: ${TENANT_ID:-default}
    depends_on:
      - postgres
      - kafka
      - redis

volumes:
  pgdata:
