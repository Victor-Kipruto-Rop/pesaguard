version: "3.8"

# Data residency (Addendum III): set DEPLOYMENT_REGION, BACKUP_REGION, and LOG_REGION
# to the chosen hosting jurisdiction before go-live. See DATA_RESIDENCY.md.
# Pilot default: ke-1 (Kenya / East Africa). Backups must stay in BACKUP_REGION.

x-residency-env: &residency-env
  DEPLOYMENT_REGION: ${DEPLOYMENT_REGION:-ke-1}
  BACKUP_REGION: ${BACKUP_REGION:-ke-1}
  LOG_REGION: ${LOG_REGION:-ke-1}

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      <<: *residency-env
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 10737418240

  postgres:
    image: postgres:16
    environment:
      <<: *residency-env
      POSTGRES_USER: pesaguard
      POSTGRES_PASSWORD: pesaguard
      POSTGRES_DB: pesaguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  webhook_receiver:
    build: ../ingestion/webhook_receiver
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    environment:
      <<: *residency-env
    depends_on:
      - kafka

  reconciliation_job:
    build:
      context: ..
      dockerfile: streaming/flink_jobs/Dockerfile
    env_file:
      - ../.env
    environment:
      <<: *residency-env
    depends_on:
      - kafka
      - postgres

  dashboard_api:
    build:
      context: ..
      dockerfile: dashboard/api/Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ../.env
    environment:
      <<: *residency-env
    depends_on:
      - postgres

volumes:
  pgdata:
