name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend Docker image
        run: |
          docker build . --file docker/Dockerfile \
            --tag pesaguard-backend:latest \
            --tag pesaguard-backend:${{ github.sha }}
      - name: Build frontend Docker image
        run: |
          docker build . --file docker/Dockerfile.frontend \
            --tag pesaguard-frontend:latest \
            --tag pesaguard-frontend:${{ github.sha }}
        continue-on-error: true
      - name: Scan backend image for vulnerabilities
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy image --severity HIGH,CRITICAL pesaguard-backend:latest
        continue-on-error: true
