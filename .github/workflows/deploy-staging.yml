name: Deploy to staging

on:
  push:
    branches: [staging]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pesaguard_backend_pipeline/requirements_3.txt
      - name: Run backend tests
        run: pytest pesaguard_backend_pipeline/tests/ -q --tb=short
      - name: Deploy staging placeholder
        run: echo "Deploy to staging environment"
      - name: Notify deployment
        run: echo "Staging deployment triggered from commit ${{ github.sha }}"
