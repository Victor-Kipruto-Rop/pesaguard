name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pesaguard_backend_pipeline/requirements_3.txt
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest tests/ pesaguard_backend_pipeline/tests/ -q --tb=short
      - name: Install frontend dependencies (optional)
        run: |
          if [ -f frontend/package.json ]; then
            npm --prefix frontend ci --omit=optional
          fi
        continue-on-error: true
