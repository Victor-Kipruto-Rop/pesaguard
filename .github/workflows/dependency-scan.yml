name: Dependency and Security Scan

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays

jobs:
  python-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit safety
      - name: Audit with pip-audit
        run: pip-audit -r pesaguard_backend_pipeline/requirements_3.txt --desc
        continue-on-error: true
      - name: Scan with bandit
        run: |
          bandit -r pesaguard_backend_pipeline/ -f json -o bandit-report.json
          bandit -r pesaguard_backend_pipeline/ -f txt
        continue-on-error: true
      - name: Check with safety
        run: safety check --json
        continue-on-error: true
  
  frontend-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-security
      - name: Install dependencies
        run: npm --prefix frontend ci --omit=optional
      - name: Audit npm dependencies
        run: npm --prefix frontend audit --audit-level=moderate
        continue-on-error: true
      - name: Check vulnerabilities with npm
        run: npm --prefix frontend audit --omit=dev --json
        continue-on-error: true
